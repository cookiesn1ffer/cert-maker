[build]
  publish = "public"

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"
  # Bundle the Flask app files into the function so templates/static are available.
  included_files = ["app.py", "auth.py", "models.py", "pdf_gen.py", "templates/**", "static/**", "data/**"]

# Route every request through the Flask function.
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true
