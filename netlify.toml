[build]
  command = "pip install -r netlify/functions/requirements.txt --target netlify/functions"
  publish = "public"

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"
  included_files = ["app.py", "auth.py", "models.py", "pdf_gen.py", "templates/**", "static/**"]

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true
