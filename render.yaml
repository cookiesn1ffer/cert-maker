services:
  - type: web
    name: cookies-academy-certs
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DB_PATH
        value: /data/certs.db
    disk:
      name: cert-data
      mountPath: /data
      sizeGB: 1
