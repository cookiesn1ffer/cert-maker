services:
  - type: web
    name: cookies-academy-certs
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      # Set this in the Render dashboard to your Neon connection string.
      # Example: postgresql://user:password@host.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false
